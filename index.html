<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Base de conhecimento</title>
<style>
/* ============================================================
   CORES — troque os valores aqui para mudar toda a interface
   ============================================================ */
:root{
  --bg:#12161D; --surface:#1A1F28; --surface-2:#20262F;
  --border:#2B323D; --border-soft:#242A33;
  --text:#E7EAEE; --text-muted:#8A93A3; --text-faint:#5C6573;
  --accent:#FFA94D; --accent-soft:rgba(255,169,77,.12); --accent-border:rgba(255,169,77,.35);
  --success:#4FD1C5; --success-soft:rgba(79,209,197,.12);
  --danger:#E2675B; --danger-soft:rgba(226,103,91,.12);
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
.wrap{max-width:880px;margin:0 auto;padding:28px 20px 80px;}
.console-header{position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 85%,transparent);padding-bottom:18px;margin-bottom:6px;}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,169,77,.45);}70%{box-shadow:0 0 0 6px rgba(255,169,77,0);}100%{box-shadow:0 0 0 0 rgba(255,169,77,0);}}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
.subtitle{color:var(--text-muted);font-size:14px;margin-bottom:18px;line-height:1.5;}
.search-box input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px 16px;font-size:16px;color:var(--text);outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--accent-border);}
.search-box input::placeholder{color:var(--text-faint);}
.console-meta{display:flex;align-items:baseline;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:10px;}
.result-count{font-size:13px;color:var(--text-muted);}
.result-count b{color:var(--accent);font-size:18px;font-weight:500;}
.btn{font-size:13.5px;font-weight:600;border-radius:var(--radius-sm);border:1px solid transparent;padding:9px 14px;cursor:pointer;transition:opacity .15s,background .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
.btn:active{transform:translateY(1px);}
.btn-accent{background:var(--accent);color:#1A1207;}.btn-accent:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:var(--border);}.btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
.btn-copy{background:var(--surface-2);color:var(--text);border:1px solid var(--border);font-size:12.5px;padding:7px 11px;cursor:pointer;border-radius:var(--radius-sm);font-weight:600;font-family:inherit;}.btn-copy:hover{border-color:var(--success);color:var(--success);}.btn-copy.copied{background:var(--success-soft);border-color:var(--success);color:var(--success);}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--text-faint);border-radius:var(--radius-sm);width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}.btn-icon:hover{color:var(--text);border-color:var(--text-faint);}.btn-icon.danger:hover{color:var(--danger);border-color:var(--danger);}
.card-list{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;transition:border-color .15s;}
.card.expanded{border-color:var(--border);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:15px 16px;cursor:pointer;}
.card-title-group{flex:1;min-width:0;}
.card-title{font-weight:700;font-size:16.5px;margin-bottom:6px;}
.tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:4px;padding:2px 7px;}
.best-badge{display:inline-block;font-size:10.5px;font-weight:500;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:4px;padding:2px 7px;margin-right:8px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.chevron{color:var(--text-faint);transition:transform .15s;flex-shrink:0;margin-top:4px;}
.card.expanded .chevron{transform:rotate(180deg);}
.card-body{display:none;padding:0 16px 18px;border-top:1px solid var(--border-soft);}
.card.expanded .card-body{display:block;padding-top:16px;}
.section{margin-bottom:16px;}
.section:last-child{margin-bottom:0;}
.section-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.steps{margin:0;padding-left:0;list-style:none;counter-reset:step;}
.steps>li{counter-increment:step;position:relative;padding-left:30px;margin-bottom:12px;font-size:14px;line-height:1.5;}
.steps>li::before{content:counter(step);position:absolute;left:0;top:0;width:20px;height:20px;background:var(--surface-2);border:1px solid var(--border);border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--accent);}
.branch-box{margin-top:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.branch-question{font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px;}
.branch-btns{display:flex;gap:8px;}
.branch-btn{font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);padding:6px 16px;cursor:pointer;transition:all .15s;font-family:inherit;}
.branch-btn:hover{color:var(--text);border-color:var(--text-faint);}
.branch-btn.active-sim{background:var(--success-soft);border-color:var(--success);color:var(--success);}
.branch-btn.active-nao{background:var(--danger-soft);border-color:var(--danger);color:var(--danger);}
.sub-flow{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft);}
.sub-flow.show{display:block;}
.sub-flow-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
.sub-steps{margin:0;padding-left:0;list-style:none;counter-reset:substep;}
.sub-steps li{counter-increment:substep;position:relative;padding-left:30px;margin-bottom:10px;font-size:14px;line-height:1.5;color:var(--text);}
.sub-steps li::before{content:counter(substep);position:absolute;left:0;top:0;width:20px;height:20px;background:var(--surface);border:1px solid var(--border);border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--accent);}
.text-block{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:12px 13px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;color:var(--text);margin-bottom:8px;}
.checklist{margin:0;padding:0;list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5;margin-bottom:6px;}
.checklist li::before{content:"";width:14px;height:14px;margin-top:2px;flex-shrink:0;border:1.5px solid var(--text-faint);border-radius:3px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state .big{font-size:17px;color:var(--text);margin-bottom:6px;}
.empty-state .small{font-size:13.5px;margin-bottom:18px;}
.confirm-row{display:flex;align-items:center;gap:6px;}
.confirm-row span{font-size:12px;color:var(--danger);}
.overlay{position:fixed;inset:0;background:rgba(8,10,14,.7);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow-y:auto;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:600px;padding:22px;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
.field .hint{font-weight:400;color:var(--text-faint);}
.field input,.field textarea{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;color:var(--text);font-size:13.5px;outline:none;resize:vertical;font-family:inherit;}
.field textarea{min-height:64px;line-height:1.5;}
.field input:focus,.field textarea:focus{border-color:var(--accent-border);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.step-row{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;}
.step-row-top{display:flex;gap:8px;align-items:center;}
.step-text-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13.5px;outline:none;font-family:inherit;}
.step-text-input:focus{border-color:var(--accent-border);}
.btn-branch-toggle{font-size:11px;background:transparent;border:1px solid var(--border);color:var(--text-faint);border-radius:4px;padding:5px 9px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.btn-branch-toggle.ativo{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent);}
.btn-remove{background:transparent;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;line-height:1;font-family:inherit;}
.btn-remove:hover{color:var(--danger);}
.branch-form-fields{margin-top:10px;display:none;flex-direction:column;gap:8px;}
.branch-form-fields.show{display:flex;}
.branch-form-q label{font-size:11px;color:var(--accent);font-weight:600;display:block;margin-bottom:4px;}
.branch-form-q input{background:var(--bg);border:1px solid var(--accent-border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;outline:none;width:100%;font-family:inherit;}
.branch-path{border-radius:var(--radius-sm);padding:10px 12px;}
.branch-path-sim{background:var(--success-soft);border:1px solid var(--success);}
.branch-path-nao{background:var(--danger-soft);border:1px solid var(--danger);}
.branch-path-label{font-size:11px;font-weight:700;margin-bottom:8px;}
.branch-path-sim .branch-path-label{color:var(--success);}
.branch-path-nao .branch-path-label{color:var(--danger);}
.sub-step-input-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.sub-step-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.sub-step-input-row input:focus{border-color:var(--accent-border);}
.btn-add-sub{font-size:12px;background:transparent;border:1px dashed var(--border);color:var(--text-faint);border-radius:4px;padding:5px 10px;cursor:pointer;font-family:inherit;width:100%;margin-top:2px;}
.btn-add-sub:hover{color:var(--text);border-color:var(--text-faint);}
.admin-bar-wrap{margin-top:10px;}
.admin-link{font-size:12px;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;text-decoration-color:var(--border);font-family:inherit;}
.admin-link:hover{color:var(--text-muted);}
.admin-active{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--success);}
.admin-active button{font-size:12px;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;font-family:inherit;}
.admin-active button:hover{color:var(--danger);}
.banner{background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);font-size:13px;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;display:none;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);border:1px solid var(--success);color:var(--success);padding:10px 18px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:60;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.wrap{padding:18px 14px 70px;}h1{font-size:22px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="console-header">
    <h1>Base de conhecimento</h1>
    <p class="subtitle">Digite o que o cliente relatou. O sistema encontra o problema e mostra o guia completo de atendimento.</p>
    <div class="search-box">
      <input id="search" type="text" placeholder="ex: lentidão, senha, não consegue acessar..." autocomplete="off">
    </div>
    <div class="console-meta">
      <div class="result-count"><b id="count">0</b> <span id="countLabel">problemas encontrados</span></div>
      <div id="adminTools" style="display:none;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" id="btnImport">📥 Importar .txt</button>
        <button class="btn btn-ghost" id="btnExport">📤 Exportar .txt</button>
        <button class="btn btn-accent" id="btnNew">+ Novo problema</button>
      </div>
    </div>
    <div class="admin-bar-wrap" id="adminBar"></div>
    <input type="file" id="fileInput" accept=".txt,text/plain" style="display:none">
  </div>
  <div class="banner" id="banner">Erro ao conectar com o banco de dados. Verifique o firebaseConfig.</div>
  <div class="card-list" id="cardList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Novo problema</h2>
    <form id="form">
      <div class="field">
        <label>Título</label>
        <input id="f_titulo" type="text" placeholder="ex: Lentidão na conexão" required>
      </div>
      <div class="field">
        <label>Palavras-chave <span class="hint">(separadas por vírgula)</span></label>
        <input id="f_tags" type="text" placeholder="ex: lentidão, lento, travando, internet">
      </div>
      <div class="field">
        <label>Passo a passo</label>
        <div id="stepsBuilder"></div>
        <button type="button" class="btn btn-ghost" id="btnAddStep" style="margin-top:8px;font-size:13px;padding:7px 12px;">＋ Adicionar passo</button>
      </div>
      <div class="field">
        <label>Texto pronto da descrição</label>
        <textarea id="f_descricao" placeholder="Cliente relata lentidão na conexão..."></textarea>
      </div>
      <div class="field">
        <label>Informações para coletar <span class="hint">(uma por linha)</span></label>
        <textarea id="f_infos" placeholder="Velocidade contratada&#10;Horário em que percebeu o problema"></textarea>
      </div>
      <div class="field">
        <label>Texto pronto de fechamento</label>
        <textarea id="f_fechamento" placeholder="Chamado encerrado. Problema resolvido."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btnCancel">Cancelar</button>
        <button type="submit" class="btn btn-accent">Salvar</button>
      </div>
    </form>
  </div>
</div>

<div class="overlay" id="adminOverlay">
  <div class="modal" style="max-width:380px;">
    <h2>Acesso administrador</h2>
    <form id="adminLoginForm">
      <div class="field"><label>E-mail</label><input id="admin_email" type="email" required autocomplete="username"></div>
      <div class="field"><label>Senha</label><input id="admin_password" type="password" required autocomplete="current-password"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btnCancelLogin">Cancelar</button>
        <button type="submit" class="btn btn-accent">Entrar</button>
      </div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
/* ============================================================
   ⚙️ FIREBASE — COLE SUAS CHAVES AQUI
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBFITSbj8u6PPVPUB6ZAL54iRhWiohyIK0",
  authDomain: "base-inteligencia.firebaseapp.com",
  databaseURL: "https://base-inteligencia-default-rtdb.firebaseio.com",
  projectId: "base-inteligencia",
  storageBucket: "base-inteligencia.firebasestorage.app",
  messagingSenderId: "574676361159",
  appId: "1:574676361159:web:a8d512f98d46ddace743e2"
};
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged,setPersistence,browserSessionPersistence}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const auth=getAuth(app);
setPersistence(auth,browserSessionPersistence).catch(()=>{});

let entries=[],editingId=null,confirmDeleteId=null,isAdmin=false;

/* ---------- utilitários ---------- */
function uid(){return 'kb_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
const STOPS=new Set(['que','nao','de','do','da','dos','das','em','no','na','nos','nas','um','uma','e','o','a','os','as','com','para','por','pra','foi','ser','tem','ele','ela','eu','voce','vc','cliente','disse','falou','relata','quer','pode','consegue','consigo','meu','seu','isso','muito','aqui','tambem','mas','porem','entao','agora','hoje','ai','so','ja','ainda','sobre','ate','sem','mais','menos','ola','oi','bom','boa','dia','tarde','noite']);
function tokenize(s){return norm(s).split(/[^a-z0-9]+/).filter(w=>w.length>1&&!STOPS.has(w));}
function splitLines(s){return (s||'').split('\n').map(x=>x.trim()).filter(Boolean);}
function splitCommas(s){return (s||'').split(',').map(x=>x.trim()).filter(Boolean);}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1800);}
async function copiar(texto,btn){
  try{await navigator.clipboard.writeText(texto);}catch(e){const ta=document.createElement('textarea');ta.value=texto;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast('Copiado!');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},1400);}
}

/* ---------- Firebase ---------- */
const entriesRef=ref(db,'entries');
function iniciarSync(){
  onValue(entriesRef,snap=>{
    const val=snap.val();
    if(!val){entries=[];render();return;}
    entries=Array.isArray(val)?val:Object.values(val);
    render();
  },err=>{document.getElementById('banner').style.display='block';console.error(err);});
}
async function salvar(){
  try{await set(entriesRef,entries);}
  catch(e){showToast('Erro ao salvar');console.error(e);}
}

/* ---------- Auth ---------- */
function iniciarAuth(){
  onAuthStateChanged(auth,user=>{isAdmin=!!user;renderAdminBar();render();});
}
function renderAdminBar(){
  const bar=document.getElementById('adminBar');
  const tools=document.getElementById('adminTools');
  if(isAdmin){
    bar.innerHTML=`<div class="admin-active">👤 Modo administrador <button id="btnLogout">Sair</button></div>`;
    tools.style.display='flex';
    document.getElementById('btnLogout').addEventListener('click',async()=>{await signOut(auth);showToast('Saiu do modo administrador');});
  } else {
    bar.innerHTML=`<button class="admin-link" id="btnLogin">🔒 Acesso administrador</button>`;
    tools.style.display='none';
    document.getElementById('btnLogin').addEventListener('click',()=>{document.getElementById('adminOverlay').classList.add('show');setTimeout(()=>document.getElementById('admin_email').focus(),50);});
  }
}

/* ---------- Busca ---------- */
function pontuar(qt,e){
  if(!qt.length)return 0;
  const tt=tokenize(e.titulo),tg=(e.tags||[]).flatMap(t=>tokenize(t)),dt=tokenize(e.descricao_pronta);
  let s=0;
  for(const q of qt){if(tg.includes(q))s+=3;if(tt.includes(q))s+=3;if(dt.includes(q))s+=1;if(!tg.includes(q)&&tg.some(x=>x.length>3&&(x.startsWith(q)||q.startsWith(x))))s+=1.5;}
  return s;
}
function getFiltrados(){
  const qt=tokenize(document.getElementById('search').value.trim());
  let list=entries.slice().sort((a,b)=>a.titulo.localeCompare(b.titulo,'pt-BR'));
  if(!qt.length)return list;
  return list.map(e=>({e,s:pontuar(qt,e)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.e);
}

/* ---------- Render passo (com ou sem ramificação) ---------- */
function renderPasso(step,idx){
  // Passo com ramificação (objeto {_b:1, t, p, s, n})
  if(step&&typeof step==='object'&&step._b){
    const sel=step._sel||null;
    const simHtml=(step.s||[]).map(s=>`<li>${esc(s)}</li>`).join('');
    const naoHtml=(step.n||[]).map(s=>`<li>${esc(s)}</li>`).join('');
    return `<li>${esc(step.t)}
      <div class="branch-box" data-idx="${idx}">
        <div class="branch-question">${esc(step.p)}</div>
        <div class="branch-btns">
          <button class="branch-btn ${sel==='s'?'active-sim':''}" data-action="branch" data-idx="${idx}" data-choice="s">✅ Sim</button>
          <button class="branch-btn ${sel==='n'?'active-nao':''}" data-action="branch" data-idx="${idx}" data-choice="n">❌ Não</button>
        </div>
        <div class="sub-flow ${sel==='s'?'show show-sim':''}">
          <ol class="sub-steps">${simHtml||'<li>Nenhum passo cadastrado</li>'}</ol>
        </div>
        <div class="sub-flow ${sel==='n'?'show show-nao':''}">
          <ol class="sub-steps">${naoHtml||'<li>Nenhum passo cadastrado</li>'}</ol>
        </div>
      </div>
    </li>`;
  }
  // Compatibilidade com formato legado (string com ||)
  const txt=typeof step==='string'?step:(step&&step.t)||'';
  if(txt.includes('||')){
    const p=txt.split('||').map(x=>x.trim());
    if(p.length===4) return renderPasso({_b:1,t:p[0],p:p[1],s:[p[2]],n:[p[3]],_sel:null},idx);
  }
  return `<li>${esc(txt)}</li>`;
}

/* ---------- Card HTML ---------- */
function cardHtml(e,melhor){
  const aberto=e._expanded||melhor?'expanded':'';
  const tagsHtml=(e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const passosHtml=(e.passos_abertura||[]).map((s,i)=>renderPasso(s,i)).join('');
  const infosHtml=(e.informacoes_necessarias||[]).map(i=>`<li>${esc(i)}</li>`).join('');
  const confirmando=confirmDeleteId===e.id;
  return `<div class="card ${aberto}" data-id="${e.id}">
    <div class="card-head" data-action="toggle">
      <div class="card-title-group">
        <div class="card-title">${melhor?'<span class="best-badge">🎯 melhor resultado</span>':''}${esc(e.titulo)}</div>
        <div class="tags">${tagsHtml}</div>
      </div>
      <div class="card-actions">
        ${!isAdmin?'':confirmando
          ?`<div class="confirm-row"><span>Excluir?</span><button class="btn-icon danger" data-action="confirm-delete">✓</button><button class="btn-icon" data-action="cancel-delete">✕</button></div>`
          :`<button class="btn-icon" data-action="edit">✎</button><button class="btn-icon danger" data-action="delete">🗑</button>`}
      </div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="card-body">
      <div class="section">
        <div class="section-label">Passo a passo</div>
        <ol class="steps">${passosHtml||'<li style="opacity:.5;padding-left:0;list-style:none">Nenhum passo cadastrado</li>'}</ol>
      </div>
      <div class="section">
        <div class="section-label">Descrição <button class="btn-copy" data-action="copy-desc">Copiar</button></div>
        <div class="text-block">${esc(e.descricao_pronta)||'—'}</div>
      </div>
      <div class="section">
        <div class="section-label">Informações para coletar</div>
        <ul class="checklist">${infosHtml||'<li style="opacity:.5">Nenhuma cadastrada</li>'}</ul>
      </div>
      <div class="section">
        <div class="section-label">Fechamento <button class="btn-copy" data-action="copy-fechamento">Copiar</button></div>
        <div class="text-block">${esc(e.texto_fechamento)||'—'}</div>
      </div>
    </div>
  </div>`;
}

/* ---------- Render ---------- */
function render(){
  const lista=getFiltrados();
  const buscando=tokenize(document.getElementById('search').value.trim()).length>0;
  document.getElementById('count').textContent=lista.length;
  document.getElementById('countLabel').textContent=lista.length===1?'problema encontrado':'problemas encontrados';
  const c=document.getElementById('cardList');
  if(!entries.length){
    c.innerHTML=`<div class="empty-state"><div class="big">Base vazia</div><div class="small">${isAdmin?'Cadastre o primeiro problema ou carregue os exemplos.':'Peça ao administrador para cadastrar os problemas.'}</div>${isAdmin?'<button class="btn btn-accent" onclick="openModal()">+ Novo problema</button> <button class="btn btn-ghost" onclick="carregarExemplos()" style="margin-left:8px">🌱 Exemplos</button>':''}</div>`;
    return;
  }
  if(!lista.length){
    c.innerHTML=`<div class="empty-state"><div class="big">Nenhum problema encontrado</div><div class="small">${isAdmin?'Tente outras palavras ou cadastre esse caso.':'Tente outras palavras ou avise o administrador.'}</div>${isAdmin?'<button class="btn btn-accent" onclick="openModal()">+ Cadastrar</button>':''}</div>`;
    return;
  }
  c.innerHTML=lista.map((e,i)=>cardHtml(e,buscando&&i===0)).join('');
}

/* ---------- Construtor visual de passos ---------- */
function criarSubStepRow(texto,container){
  const row=document.createElement('div');
  row.className='sub-step-input-row';
  row.innerHTML=`<input type="text" placeholder="Descreva o sub-passo..." value="${esc(texto||'')}"><button type="button" class="btn-remove">✕</button>`;
  row.querySelector('.btn-remove').addEventListener('click',()=>row.remove());
  container.insertBefore(row,container.querySelector('.btn-add-sub'));
}

function criarLinhaStep(step){
  const isBranch=step&&typeof step==='object'&&step._b;
  const texto=isBranch?step.t:(typeof step==='string'?step:'');
  const row=document.createElement('div');
  row.className='step-row';
  row.innerHTML=`
    <div class="step-row-top">
      <input type="text" class="step-text-input" placeholder="Descreva o passo..." value="${esc(texto)}">
      <button type="button" class="btn-branch-toggle ${isBranch?'ativo':''}">⑂ Ramificação</button>
      <button type="button" class="btn-remove">✕</button>
    </div>
    <div class="branch-form-fields ${isBranch?'show':''}">
      <div class="branch-form-q">
        <label>Pergunta que aparece no card</label>
        <input type="text" class="branch-q-input" placeholder="O cliente é empresarial?" value="${esc(isBranch?step.p:'')}">
      </div>
      <div class="branch-path branch-path-sim">
        <div class="branch-path-label">✅ Fluxo Sim — passos ao clicar Sim</div>
        <div class="sim-steps-container"></div>
        <button type="button" class="btn-add-sub">＋ Adicionar passo Sim</button>
      </div>
      <div class="branch-path branch-path-nao">
        <div class="branch-path-label">❌ Fluxo Não — passos ao clicar Não</div>
        <div class="nao-steps-container"></div>
        <button type="button" class="btn-add-sub">＋ Adicionar passo Não</button>
      </div>
    </div>`;
  const simC=row.querySelector('.sim-steps-container');
  const naoC=row.querySelector('.nao-steps-container');
  (isBranch&&step.s||[]).forEach(t=>criarSubStepRow(t,simC));
  (isBranch&&step.n||[]).forEach(t=>criarSubStepRow(t,naoC));
  row.querySelectorAll('.btn-add-sub').forEach((btn,i)=>{
    btn.addEventListener('click',()=>criarSubStepRow('',i===0?simC:naoC));
  });
  row.querySelector('.btn-branch-toggle').addEventListener('click',()=>{
    const bf=row.querySelector('.branch-form-fields');
    const btn=row.querySelector('.btn-branch-toggle');
    const abrir=!bf.classList.contains('show');
    bf.classList.toggle('show',abrir);
    btn.classList.toggle('ativo',abrir);
    if(abrir)row.querySelector('.branch-q-input').focus();
  });
  row.querySelector('.btn-remove').addEventListener('click',()=>row.remove());
  return row;
}

function renderStepBuilder(passos){
  const b=document.getElementById('stepsBuilder');
  b.innerHTML='';
  if(!passos||!passos.length){b.appendChild(criarLinhaStep(''));return;}
  passos.forEach(s=>{
    if(typeof s==='string'&&s.includes('||')){
      const p=s.split('||').map(x=>x.trim());
      if(p.length===4){b.appendChild(criarLinhaStep({_b:1,t:p[0],p:p[1],s:[p[2]],n:[p[3]]}));return;}
    }
    b.appendChild(criarLinhaStep(s));
  });
}

function coletarPassos(){
  return Array.from(document.querySelectorAll('#stepsBuilder .step-row')).map(row=>{
    const texto=row.querySelector('.step-text-input').value.trim();
    const bf=row.querySelector('.branch-form-fields');
    if(bf.classList.contains('show')){
      const q=row.querySelector('.branch-q-input').value.trim();
      const simPassos=Array.from(row.querySelectorAll('.sim-steps-container .sub-step-input-row input')).map(i=>i.value.trim()).filter(Boolean);
      const naoPassos=Array.from(row.querySelectorAll('.nao-steps-container .sub-step-input-row input')).map(i=>i.value.trim()).filter(Boolean);
      if(q)return {_b:1,t:texto,p:q,s:simPassos,n:naoPassos};
    }
    return texto;
  }).filter(v=>v&&(typeof v==='string'?v.trim():v.t));
}

/* ---------- Modal ---------- */
function openModal(entry){
  editingId=entry?entry.id:null;
  document.getElementById('modalTitle').textContent=entry?'Editar problema':'Novo problema';
  document.getElementById('f_titulo').value=entry?entry.titulo:'';
  document.getElementById('f_tags').value=entry?(entry.tags||[]).join(', '):'';
  renderStepBuilder(entry?entry.passos_abertura:[]);
  document.getElementById('f_descricao').value=entry?entry.descricao_pronta:'';
  document.getElementById('f_infos').value=entry?(entry.informacoes_necessarias||[]).join('\n'):'';
  document.getElementById('f_fechamento').value=entry?entry.texto_fechamento:'';
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('f_titulo').focus(),50);
}
function closeModal(){document.getElementById('overlay').classList.remove('show');editingId=null;}

/* ---------- Exemplos padrão ---------- */

async function carregarExemplos(){
  if(!isAdmin)return;
  entries=gerarExemplos();
  await salvar();
  showToast('Exemplos carregados!');
}

/* ---------- Export .txt ---------- */
function buildTxt(lista){
  return lista.map(e=>{
    const passosStr=(e.passos_abertura||[]).map((p,i)=>{
      if(p&&typeof p==='object'&&p._b){
        const sim=(p.s||[]).map((s,j)=>`    SIM_${j+1}: ${s}`).join('\n');
        const nao=(p.n||[]).map((s,j)=>`    NAO_${j+1}: ${s}`).join('\n');
        return `BRANCH:\n  TEXTO: ${p.t}\n  PERGUNTA: ${p.p}\n${sim}\n${nao}`;
      }
      return `${i+1}. ${typeof p==='string'?p:(p&&p.t)||''}`;
    }).join('\n');
    return ['===PROBLEMA===',`TITULO: ${e.titulo}`,`TAGS: ${(e.tags||[]).join(', ')}`,'PASSOS:',passosStr,'DESCRICAO:',e.descricao_pronta||'','INFORMACOES:',(e.informacoes_necessarias||[]).join('\n'),'FECHAMENTO:',e.texto_fechamento||'','===FIM==='].join('\n');
  }).join('\n\n');
}

/* ---------- Event listeners ---------- */
document.getElementById('search').addEventListener('input',render);

document.getElementById('form').addEventListener('submit',async ev=>{
  ev.preventDefault();
  if(!isAdmin)return;
  const data={
    titulo:document.getElementById('f_titulo').value.trim(),
    tags:splitCommas(document.getElementById('f_tags').value),
    passos_abertura:coletarPassos(),
    descricao_pronta:document.getElementById('f_descricao').value.trim(),
    informacoes_necessarias:splitLines(document.getElementById('f_infos').value),
    texto_fechamento:document.getElementById('f_fechamento').value.trim()
  };
  if(!data.titulo)return;
  if(editingId){const i=entries.findIndex(e=>e.id===editingId);if(i>-1)entries[i]={...entries[i],...data};}
  else entries.push({id:uid(),...data});
  await salvar();closeModal();render();
  showToast(editingId?'Problema atualizado':'Problema cadastrado');
});

document.getElementById('btnNew').addEventListener('click',()=>{if(isAdmin)openModal();});
document.getElementById('btnAddStep').addEventListener('click',()=>document.getElementById('stepsBuilder').appendChild(criarLinhaStep('')));
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',ev=>{if(ev.target.id==='overlay')closeModal();});

document.getElementById('btnExport').addEventListener('click',()=>{
  if(!isAdmin)return;
  const blob=new Blob([buildTxt(entries)],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='base-conhecimento.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Exportado');
});
document.getElementById('btnImport').addEventListener('click',()=>{if(isAdmin)document.getElementById('fileInput').click();});
document.getElementById('fileInput').addEventListener('change',async ev=>{
  if(!isAdmin)return;const file=ev.target.files[0];if(!file)return;
  showToast('Para problemas com ramificação, use o formulário visual.');
  ev.target.value='';
});

document.getElementById('adminLoginForm').addEventListener('submit',async ev=>{
  ev.preventDefault();
  try{await signInWithEmailAndPassword(auth,document.getElementById('admin_email').value.trim(),document.getElementById('admin_password').value);document.getElementById('adminOverlay').classList.remove('show');showToast('Modo administrador ativado');}
  catch(e){showToast('E-mail ou senha incorretos');}
});
document.getElementById('btnCancelLogin').addEventListener('click',()=>document.getElementById('adminOverlay').classList.remove('show'));
document.getElementById('adminOverlay').addEventListener('click',ev=>{if(ev.target.id==='adminOverlay')document.getElementById('adminOverlay').classList.remove('show');});

document.getElementById('cardList').addEventListener('click',async ev=>{
  const card=ev.target.closest('.card');if(!card)return;
  const id=card.dataset.id;
  const entry=entries.find(e=>e.id===id);
  const action=ev.target.dataset.action;

  // Ramificação — Sim / Não
  if(action==='branch'){
    const idx=parseInt(ev.target.dataset.idx);
    const choice=ev.target.dataset.choice;
    if(!entry)return;
    const step=entry.passos_abertura[idx];
    if(!step||typeof step!=='object')return;
    step._sel=(step._sel===choice)?null:choice;
    const box=ev.target.closest('.branch-box');
    box.querySelectorAll('.branch-btn').forEach(b=>{
      b.classList.remove('active-sim','active-nao');
      if(step._sel)b.classList.toggle(`active-${step._sel==='s'?'sim':'nao'}`,b.dataset.choice===step._sel);
    });
    const flows=box.querySelectorAll('.sub-flow');
    flows[0].className=`sub-flow${step._sel==='s'?' show show-sim':''}`;
    flows[1].className=`sub-flow${step._sel==='n'?' show show-nao':''}`;
    return;
  }

  if(action==='edit'){if(isAdmin)openModal(entry);return;}
  if(action==='delete'){if(isAdmin){confirmDeleteId=id;render();}return;}
  if(action==='cancel-delete'){confirmDeleteId=null;render();return;}
  if(action==='confirm-delete'){
    if(!isAdmin)return;
    entries=entries.filter(e=>e.id!==id);confirmDeleteId=null;await salvar();render();showToast('Excluído');return;
  }
  if(action==='copy-desc'){copiar(entry.descricao_pronta,ev.target);return;}
  if(action==='copy-fechamento'){copiar(entry.texto_fechamento,ev.target);return;}

  if(action==='toggle'||ev.target.closest('[data-action="toggle"]')){
    if(entry)entry._expanded=!entry._expanded;render();
  }
});

window.openModal=openModal;
window.carregarExemplos=carregarExemplos;

(function(){renderAdminBar();iniciarAuth();iniciarSync();})();
</script>
